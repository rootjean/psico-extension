<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PsychNote</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="logo-mark">
    <svg viewBox="0 0 24 24" fill="none" stroke="#0a1510" stroke-width="2.5" stroke-linecap="round">
      <path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/>
      <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
      <line x1="12" y1="19" x2="12" y2="22"/>
    </svg>
  </div>
  <div class="header-text">
    <h1>PsychNote</h1>
    <p>Evolución clínica automática</p>
  </div>
  <div class="status-dot" id="statusDot">
    <div class="dot" id="dot"></div>
    <span id="statusText">Listo</span>
  </div>
</div>

<!-- Content -->
<div class="content">

  <!-- Record Section -->
  <div class="record-section">
    <div class="record-label">Fuentes de Audio</div>
    <div class="sources">
      <button class="source-toggle on" id="toggleBrowser">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <rect x="2" y="3" width="20" height="14" rx="2"/>
          <line x1="8" y1="21" x2="16" y2="21"/>
          <line x1="12" y1="17" x2="12" y2="21"/>
        </svg>
        Pantalla
      </button>
      <button class="source-toggle on" id="toggleMic">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        </svg>
        Micrófono
      </button>
    </div>
    <button class="btn-record" id="btnRecord">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="8"/></svg>
      Iniciar Grabación
    </button>
    <div class="timer" id="timer">00:00:00</div>
  </div>

  <!-- Progress -->
  <div class="progress-section" id="progressSection">
    <div class="progress-label">Procesando Sesión</div>
    <div class="step" id="step-transcribe">
      <div class="step-icon pending" id="icon-transcribe">○</div>
      <div class="step-info">
        <div class="step-name">Transcripción de audio</div>
        <div class="step-detail" id="detail-transcribe">Groq Whisper · Español</div>
      </div>
    </div>
    <div class="step" id="step-analyze">
      <div class="step-icon pending" id="icon-analyze">○</div>
      <div class="step-info">
        <div class="step-name">Análisis clínico IA</div>
        <div class="step-detail" id="detail-analyze">Llama 3.3 70B · Groq API</div>
      </div>
    </div>
    <div class="step" id="step-format">
      <div class="step-icon pending" id="icon-format">○</div>
      <div class="step-info">
        <div class="step-name">Generando evolución</div>
        <div class="step-detail" id="detail-format">Formato historia clínica</div>
      </div>
    </div>
  </div>

  <!-- Output -->
  <div class="output-section" id="outputSection">
    <div class="output-header">
      <div class="output-label">▸ Transcripción</div>
      <div style="display:flex;gap:6px">
        <button class="btn-copy" id="btnCopyTranscript">Copiar</button>
        <button class="btn-clear" id="btnClear">Limpiar todo</button>
      </div>
    </div>
    <div class="transcript-box" id="transcriptBox"></div>

    <div class="output-header" style="margin-top:14px">
      <div class="output-label" style="color:var(--accent2)">▸ Evolución Clínica</div>
      <button class="btn-copy" id="btnCopyEvolution">Copiar</button>
    </div>
    <div class="evolution-box" id="evolutionBox"></div>
  </div>

</div>

<!-- Footer -->
<div class="footer">
  <button class="btn-settings" id="btnSettings">⚙ Configuración API</button>
  <span class="version">v1.0.1</span>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Settings Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>Clave API</h2>
    <div class="field">
      <label>Groq API Key</label>
      <input type="password" id="inputGroqKey" placeholder="gsk_..." />
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="btnCancel">Cancelar</button>
      <button class="btn-save" id="btnSave">Guardar</button>
    </div>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
